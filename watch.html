<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 情報站 - Global Financial AI Watch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        html { scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

    <!-- 導覽列 -->
    <nav class="bg-blue-900 text-white p-4 shadow-md">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">AI 情報站</h1>
            <div class="hidden md:flex space-x-4">
                <a href="index.html" class="hover:text-orange-300">AI Trend Weekly</a>
                <a href="watch.html" class="hover:text-orange-300 border-b-2 border-white pb-1">Global Financial AI Watch</a>
                <a href="docs.html" class="hover:text-orange-300">AI Model Docs</a>
            </div>
            <button id="menuToggle" class="md:hidden flex flex-col space-y-1.5 p-2" aria-label="Menu">
                <span class="block w-6 h-0.5 bg-white"></span>
                <span class="block w-6 h-0.5 bg-white"></span>
                <span class="block w-6 h-0.5 bg-white"></span>
            </button>
        </div>
        <div id="mobileMenu" class="hidden md:hidden mt-3 pb-2 border-t border-blue-800">
            <div class="max-w-6xl mx-auto flex flex-col space-y-3 pt-3">
                <a href="index.html" class="hover:text-orange-300">AI Trend Weekly</a>
                <a href="watch.html" class="hover:text-orange-300 border-b-2 border-white pb-1 inline-block">Global Financial AI Watch</a>
                <a href="docs.html" class="hover:text-orange-300">AI Model Docs</a>
            </div>
        </div>
    </nav>

    <!-- 主要內容區 -->
    <main class="max-w-7xl mx-auto px-4 py-6">

        <!-- 控制區 -->
        <div class="mb-8 bg-white p-4 rounded-xl shadow-sm border border-gray-200">
            <div class="flex flex-col sm:flex-row gap-4 items-start sm:items-center justify-between mb-4">
                <h2 class="text-xl font-semibold text-gray-700">Global Financial AI Watch</h2>
            </div>
            <div class="flex flex-col sm:flex-row gap-3 items-start sm:items-center">
                <div class="flex items-center gap-2">
                    <span class="text-sm font-medium text-gray-600">📅 篩選月份：</span>
                    <select id="monthSelector" class="border border-gray-300 rounded-lg p-2 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                        <option value="ALL">全部顯示 (All)</option>
                    </select>
                </div>
                <div class="relative flex-1 min-w-[200px]">
                    <input type="text" id="watchSearchInput" placeholder="搜尋新聞..."
                           class="w-full pl-10 pr-10 py-2 rounded-lg border border-gray-300 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm">
                    <svg class="w-4 h-4 text-gray-400 absolute left-3 top-2.5 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                    <button id="watchClearSearch" class="hidden absolute right-3 top-2.5 text-gray-400 hover:text-gray-600" aria-label="清除搜尋">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- 雙欄標題 (桌機) -->
        <div class="hidden md:grid grid-cols-[1fr_60px_1fr] gap-0 mb-6">
            <div class="bg-white rounded-xl border border-gray-200 border-t-4 border-t-green-500 shadow-sm px-5 py-4 text-center">
                <h2 class="text-lg font-bold text-gray-800">🇹🇼 台灣市場 (TAIWAN)</h2>
            </div>
            <div></div>
            <div class="bg-white rounded-xl border border-gray-200 border-t-4 border-t-amber-500 shadow-sm px-5 py-4 text-center">
                <h2 class="text-lg font-bold text-gray-800">🌐 國際市場 (GLOBAL)</h2>
            </div>
        </div>

        <!-- 手機版圖例 -->
        <div class="flex md:hidden items-center gap-6 mb-6 px-2">
            <div class="flex items-center gap-2">
                <span class="w-3 h-3 rounded-full bg-green-500 inline-block"></span>
                <span class="text-sm text-gray-600 font-medium">🇹🇼 台灣市場</span>
            </div>
            <div class="flex items-center gap-2">
                <span class="w-3 h-3 rounded-full bg-amber-500 inline-block"></span>
                <span class="text-sm text-gray-600 font-medium">🌐 國際市場</span>
            </div>
        </div>

        <!-- 時間軸內容 -->
        <div id="timelineContainer">
            <!-- 由 JS 動態生成 -->
        </div>

    </main>

    <script>
        const URL_FINANCE = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSIk2DNeHriB4uTPLwvkQpPE8S-saggIUIIB1sidpnEfu-Tuf9oTqVqBEa0SW8dssXPFHiYznLmnxvh/pub?output=csv';

        let allFinanceData = [];
        let currentMonthFilter = 'ALL';
        let currentSearchTerm = '';

        document.getElementById('menuToggle').addEventListener('click', () => {
            document.getElementById('mobileMenu').classList.toggle('hidden');
        });

        function fetchCSV(url) {
            return new Promise((resolve, reject) => {
                Papa.parse(url, {
                    download: true,
                    header: true,
                    skipEmptyLines: true,
                    complete: results => resolve(results.data),
                    error: err => { console.error("CSV 讀取錯誤:", err); reject(err); }
                });
            });
        }

        function isDomesticNews(news) {
            const loc = (news['location'] || '').toLowerCase();
            const isChina = loc.includes('china') || loc.includes('beijing') || loc.includes('shanghai')
                         || loc.includes('中國') || loc.includes('北京') || loc.includes('上海')
                         || loc.includes('guangzhou') || loc.includes('shenzhen') || loc.includes('guangdong');
            const isTaiwan = loc.includes('taiwan') || loc.includes('taipei');
            return isTaiwan && !isChina;
        }

        function buildCard(news, domestic) {
            const loc = news['location'] || (domestic ? 'Taiwan' : 'Global');
            let insight = (news['pm_insight'] || '').replace(/\*\*(.*?)\*\*/g, '<span class="font-bold text-amber-700">$1</span>');
            const accentText = domestic ? 'text-green-700' : 'text-amber-700';

            return `
                <div class="bg-white rounded-xl border border-gray-200 shadow-sm hover:shadow-md transition-shadow p-5 mb-4">
                    <div class="flex justify-between items-center mb-3">
                        <span class="bg-gray-100 text-gray-600 text-xs px-3 py-1 rounded-full font-medium">${news['publish_date']}</span>
                        <span class="text-xs text-gray-400 font-medium">${loc}</span>
                    </div>
                    ${news['main_company'] ? `<div class="text-xs font-bold uppercase tracking-widest ${accentText} mb-2">${news['main_company']}</div>` : ''}
                    <h3 class="font-bold text-gray-900 text-base leading-snug mb-2">${news['title']}</h3>
                    <p class="text-sm text-gray-600 leading-relaxed mb-4">${news['summary']}</p>
                    ${insight ? `
                    <div class="border-l-4 border-amber-400 bg-amber-50 rounded-r-lg px-4 py-3 mb-3">
                        <div class="text-xs font-bold text-amber-600 uppercase tracking-wider mb-1">💡 PM Insight</div>
                        <p class="text-sm text-gray-700 leading-relaxed">${insight}</p>
                    </div>
                    ` : ''}
                    ${news['source_name'] ? `<div class="text-xs text-gray-400 mt-2">Source: ${news['source_name']}</div>` : ''}
                    ${news['url'] ? `<a href="${news['url']}" target="_blank" class="text-xs text-orange-500 hover:underline mt-1 inline-block">閱讀原文 &rarr;</a>` : ''}
                </div>
            `;
        }

        async function initData() {
            try {
                if (URL_FINANCE.includes('YOUR_')) {
                    document.getElementById('timelineContainer').innerHTML = "<p class='text-center text-red-500'>請先替換真實的 Google Sheet CSV 網址！</p>";
                    return;
                }

                allFinanceData = await fetchCSV(URL_FINANCE);

                const monthSet = new Set();
                allFinanceData.forEach(row => {
                    if (row['publish_date']) monthSet.add(row['publish_date'].substring(0, 7));
                });
                const availableMonths = Array.from(monthSet).sort((a, b) => b.localeCompare(a));

                const monthSelector = document.getElementById('monthSelector');
                availableMonths.forEach(month => {
                    const option = document.createElement('option');
                    option.value = month;
                    option.textContent = month;
                    monthSelector.appendChild(option);
                });

                monthSelector.addEventListener('change', e => {
                    currentMonthFilter = e.target.value;
                    renderTimeline(currentMonthFilter, currentSearchTerm);
                });

                const searchInput = document.getElementById('watchSearchInput');
                const clearSearch = document.getElementById('watchClearSearch');
                searchInput.addEventListener('input', e => {
                    currentSearchTerm = e.target.value;
                    clearSearch.classList.toggle('hidden', !currentSearchTerm);
                    renderTimeline(currentMonthFilter, currentSearchTerm);
                });
                clearSearch.addEventListener('click', () => {
                    searchInput.value = '';
                    currentSearchTerm = '';
                    clearSearch.classList.add('hidden');
                    renderTimeline(currentMonthFilter, '');
                });

                renderTimeline('ALL', '');

            } catch (error) {
                document.getElementById('timelineContainer').innerHTML = "<p class='text-center text-red-500'>讀取資料失敗，請檢查網址與網路連線。</p>";
            }
        }

        function renderTimeline(monthFilter, searchTerm) {
            const container = document.getElementById('timelineContainer');
            container.innerHTML = '';

            let data = allFinanceData;
            if (monthFilter !== 'ALL') {
                data = data.filter(row => (row['publish_date'] || '').substring(0, 7) === monthFilter);
            }
            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                data = data.filter(row => {
                    const h = `${row['title']} ${row['summary']} ${row['main_company']} ${row['pm_insight']}`.toLowerCase();
                    return h.includes(term);
                });
            }
            data.sort((a, b) => new Date(b['publish_date']) - new Date(a['publish_date']));

            if (data.length === 0) {
                container.innerHTML = "<p class='text-center text-gray-500 py-12'>這個區間沒有資料哦！</p>";
                return;
            }

            // Group by date
            const groups = {};
            const groupOrder = [];
            data.forEach(news => {
                const date = news['publish_date'] || '';
                if (!groups[date]) { groups[date] = []; groupOrder.push(date); }
                groups[date].push(news);
            });

            groupOrder.forEach((date, groupIndex) => {
                const domestic = groups[date].filter(n => isDomesticNews(n));
                const global   = groups[date].filter(n => !isDomesticNews(n));

                const domesticHTML = domestic.map(n => buildCard(n, true)).join('');
                const globalHTML   = global.map(n => buildCard(n, false)).join('');

                // Dot color cycles for visual variety
                const dotColors = ['bg-amber-600', 'bg-slate-500', 'bg-amber-500', 'bg-slate-600'];
                const dotColor = dotColors[groupIndex % dotColors.length];

                container.innerHTML += `
                    <!-- Desktop two-column row -->
                    <div class="hidden md:grid grid-cols-[1fr_60px_1fr] gap-0 mb-2">
                        <!-- Taiwan column -->
                        <div>${domesticHTML || ''}</div>

                        <!-- Center timeline -->
                        <div class="flex flex-col items-center">
                            <div class="w-0.5 bg-gray-300 flex-1 ${groupIndex === 0 ? 'mt-3' : ''}"></div>
                            <div class="w-5 h-5 rounded-full ${dotColor} border-4 border-white shadow-md flex-shrink-0 my-1"></div>
                            <div class="w-0.5 bg-gray-300 flex-1"></div>
                        </div>

                        <!-- Global column -->
                        <div>${globalHTML || ''}</div>
                    </div>

                    <!-- Mobile: stacked with date header -->
                    <div class="md:hidden mb-6">
                        <div class="flex items-center gap-2 mb-3">
                            <span class="bg-gray-200 text-gray-500 text-xs px-3 py-1 rounded-full">📅 ${date}</span>
                        </div>
                        ${domestic.length > 0 ? `
                            <div class="mb-2 flex items-center gap-2">
                                <span class="w-2.5 h-2.5 rounded-full bg-green-500 inline-block"></span>
                                <span class="text-xs font-bold text-green-700 uppercase tracking-wide">台灣市場</span>
                            </div>
                            ${domesticHTML}
                        ` : ''}
                        ${global.length > 0 ? `
                            <div class="mb-2 flex items-center gap-2 mt-3">
                                <span class="w-2.5 h-2.5 rounded-full bg-amber-500 inline-block"></span>
                                <span class="text-xs font-bold text-amber-700 uppercase tracking-wide">國際市場</span>
                            </div>
                            ${globalHTML}
                        ` : ''}
                    </div>
                `;
            });
        }

        window.addEventListener('DOMContentLoaded', initData);
    </script>
</body>
</html>
