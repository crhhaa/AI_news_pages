        // 通用 toggle helper：若點同一個值則取消（回 ALL），否則選新值
        function makeToggleHandler(btnClass, activeClasses, inactiveClasses, currentRef, setter) {
            document.querySelectorAll(btnClass).forEach(btn => {
                btn.addEventListener('click', e => {
                    const val = Object.values(e.target.dataset)[0];
                    const next = (val !== 'ALL' && val === currentRef()) ? 'ALL' : val;
                    setter(next);
                    document.querySelectorAll(btnClass).forEach(b => {
                        const bVal = Object.values(b.dataset)[0];
                        const active = (next === 'ALL') ? bVal === 'ALL' : bVal === next;
                        b.classList.toggle(activeClasses[0], active);
                        b.classList.toggle(activeClasses[1], active);
                        b.classList.toggle('shadow-sm', active);
                        b.classList.toggle(inactiveClasses[0], !active);
                        b.classList.toggle(inactiveClasses[1], !active);
                        b.classList.toggle('border', !active);
                        b.classList.toggle('border-gray-300', !active);
                    });
                    renderTimeline();
                });
            });
        }

        document.getElementById('menuToggle').addEventListener('click', () => {
            document.getElementById('mobileMenu').classList.toggle('hidden');
        });

        function fetchCSV(url) {
            return new Promise((resolve, reject) => {
                Papa.parse(url, {
                    download: true,
                    header: true,
                    skipEmptyLines: true,
                    complete: results => resolve(results.data),
                    error: err => { console.error("CSV 讀取錯誤:", err); reject(err); }
                });
            });
        }

        function isDomesticNews(news) {
            const loc = (news['location'] || '').toLowerCase();
            const isChina = loc.includes('china') || loc.includes('beijing') || loc.includes('shanghai')
                         || loc.includes('中國') || loc.includes('北京') || loc.includes('上海')
                         || loc.includes('guangzhou') || loc.includes('shenzhen') || loc.includes('guangdong');
            const isTaiwan = loc.includes('taiwan') || loc.includes('taipei');
            return isTaiwan && !isChina;
        }

        function buildCard(news, domestic) {
            const loc = news['location'] || (domestic ? 'Taiwan' : 'Global');
            let insight = (news['pm_insight'] || '').replace(/\*\*(.*?)\*\*/g, '<span class="font-bold text-amber-700">$1</span>');
            let yuantaInsight = (news['yuanta_insight'] || '')
                .split(/\s*／\s*/)
                .filter(Boolean)
                .map(line => line.replace(/【(.*?)】/g, '<span class="font-bold text-blue-700">【$1】</span>'))
                .join('<br>');
            const accentText = domestic ? 'text-green-700' : 'text-amber-700';
            const domain = news['domain_category'] || 'AI';
            const badge = domainBadgeMap[domain] || { bg: 'bg-gray-100', text: 'text-gray-600', label: domain };

            // entities chips (prefer entities over main_company)
            const entitiesStr = news['entities'] || '';
            const entitiesList = entitiesStr ? entitiesStr.split(',').map(s => s.trim()).filter(Boolean) : [];
            let entityDisplay = '';
            if (entitiesList.length > 0) {
                entityDisplay = `<div class="flex flex-wrap gap-1 mb-2">${entitiesList.map(e => `<span class="text-xs font-semibold ${accentText} bg-gray-50 border border-gray-200 px-2 py-0.5 rounded-full">${e}</span>`).join('')}</div>`;
            } else if (news['main_company']) {
                entityDisplay = `<div class="text-xs font-bold uppercase tracking-widest ${accentText} mb-2">${news['main_company']}</div>`;
            }

            return `
                <div class="bg-white rounded-xl border border-gray-200 shadow-sm hover:shadow-md transition-shadow p-5 mb-4">
                    <div class="flex justify-between items-center mb-3">
                        <span class="bg-gray-100 text-gray-600 text-xs px-3 py-1 rounded-full font-medium">${news['publish_date']}</span>
                        <div class="flex items-center gap-2">
                            <span class="${badge.bg} ${badge.text} text-xs px-2 py-0.5 rounded-full font-semibold">${badge.label}</span>
                            <span class="text-xs text-gray-400 font-medium">${loc}</span>
                        </div>
                    </div>
                    ${entityDisplay}
                    <h3 class="font-bold text-gray-900 text-base leading-snug mb-2">${news['title']}</h3>
                    <p class="text-sm text-gray-600 leading-relaxed mb-4">${news['summary']}</p>
                    ${insight ? `
                    <div class="border-l-4 border-amber-400 bg-amber-50 rounded-r-lg px-4 py-3 mb-3">
                        <div class="text-xs font-bold text-amber-600 uppercase tracking-wider mb-1">💡 PM Insight</div>
                        <p class="text-sm text-gray-700 leading-relaxed">${insight}</p>
                    </div>
                    ` : ''}
                    ${yuantaInsight ? `
                    <div class="border-l-4 border-blue-400 bg-blue-50 rounded-r-lg px-4 py-3 mb-3">
                        <div class="text-xs font-bold text-blue-600 uppercase tracking-wider mb-1">🏛️ 元大視角</div>
                        <p class="text-sm text-gray-700 leading-relaxed">${yuantaInsight}</p>
                    </div>
                    ` : ''}
                    ${news['source_name'] ? `<div class="text-xs text-gray-400 mt-2">Source: ${news['source_name']}</div>` : ''}
                    ${news['url'] ? `<a href="${news['url']}" target="_blank" class="text-xs text-orange-500 hover:underline mt-1 inline-block">閱讀原文 &rarr;</a>` : ''}
                </div>
            `;
        }

        async function initData() {
            try {
                if (URL_FINANCE.includes('YOUR_')) {
                    document.getElementById('timelineContainer').innerHTML = "<p class='text-center text-red-500'>請先替換真實的 Google Sheet CSV 網址！</p>";
                    return;
                }

                const fetches = [fetchCSV(URL_FINANCE)];
                if (URL_FINTECH) fetches.push(fetchCSV(URL_FINTECH));
                const results = await Promise.all(fetches);

                // AI 金融新聞補上 domain_category
                const aiNews = results[0].map(row => ({ ...row, domain_category: row['domain_category'] || 'AI' }));
                const fintechNews = results[1] ? results[1] : [];
                allFinanceData = [...aiNews, ...fintechNews];

                const monthSet = new Set();
                allFinanceData.forEach(row => {
                    if (row['publish_date']) monthSet.add(row['publish_date'].substring(0, 7));
                });
                const availableMonths = Array.from(monthSet).sort((a, b) => b.localeCompare(a));

                const monthSelector = document.getElementById('monthSelector');
                availableMonths.forEach(month => {
                    const option = document.createElement('option');
                    option.value = month;
                    option.textContent = month;
                    monthSelector.appendChild(option);
                });

                monthSelector.addEventListener('change', e => {
                    currentMonthFilter = e.target.value;
                    renderTimeline();
                });

                const searchInput = document.getElementById('watchSearchInput');
                const clearSearch = document.getElementById('watchClearSearch');
                searchInput.addEventListener('input', e => {
                    currentSearchTerm = e.target.value;
                    clearSearch.classList.toggle('hidden', !currentSearchTerm);
                    renderTimeline();
                });
                clearSearch.addEventListener('click', () => {
                    searchInput.value = '';
                    currentSearchTerm = '';
                    clearSearch.classList.add('hidden');
                    renderTimeline();
                });

                // 篩選按鈕（點已選的 → 取消）
                makeToggleHandler('.domain-filter-btn', ['bg-orange-500','text-white'], ['bg-white','text-gray-600'],
                    () => currentDomainFilter, v => { currentDomainFilter = v; });
                makeToggleHandler('.group-filter-btn',  ['bg-indigo-600','text-white'], ['bg-white','text-gray-600'],
                    () => currentGroupFilter,  v => { currentGroupFilter  = v; });
                makeToggleHandler('.type-filter-btn',   ['bg-teal-600','text-white'],   ['bg-white','text-gray-600'],
                    () => currentTypeFilter,   v => { currentTypeFilter   = v; });
                makeToggleHandler('.yuanta-filter-btn', ['bg-blue-600','text-white'],   ['bg-white','text-gray-600'],
                    () => currentYuantaFilter, v => { currentYuantaFilter = v; });

                renderTimeline();

            } catch (error) {
                document.getElementById('timelineContainer').innerHTML = "<p class='text-center text-red-500'>讀取資料失敗，請檢查網址與網路連線。</p>";
            }
        }

        function renderTimeline() {
            const container = document.getElementById('timelineContainer');
            container.innerHTML = '';

            let data = allFinanceData;
            if (currentDomainFilter !== 'ALL') {
                data = data.filter(row => (row['domain_category'] || 'AI') === currentDomainFilter);
            }
            if (currentMonthFilter !== 'ALL') {
                data = data.filter(row => (row['publish_date'] || '').substring(0, 7) === currentMonthFilter);
            }
            // 集團篩選（全部用 entities）
            if (currentGroupFilter !== 'ALL') {
                const groupEnts = new Set(GROUP_MAP[currentGroupFilter] || []);
                data = data.filter(row => {
                    const ents = (row['entities'] || '').split(',').map(s => s.trim());
                    return ents.some(e => groupEnts.has(e));
                });
            }
            // 業別篩選（全部用 entities；集團+業別取交集）
            if (currentTypeFilter !== 'ALL') {
                const typeEnts = new Set(TYPE_MAP[currentTypeFilter] || []);
                const groupEnts = currentGroupFilter !== 'ALL'
                    ? new Set(GROUP_MAP[currentGroupFilter] || []) : null;
                data = data.filter(row => {
                    const ents = (row['entities'] || '').split(',').map(s => s.trim());
                    return ents.some(e => typeEnts.has(e) && (!groupEnts || groupEnts.has(e)));
                });
            }
            // 元大視角篩選（用 yuanta_entities）
            if (currentYuantaFilter !== 'ALL') {
                data = data.filter(row => {
                    const ye = (row['yuanta_entities'] || '').split(',').map(s => s.trim());
                    return ye.includes(currentYuantaFilter);
                });
            }
            if (currentSearchTerm) {
                const term = currentSearchTerm.toLowerCase();
                data = data.filter(row => {
                    const h = `${row['title']} ${row['summary']} ${row['entities']} ${row['main_company']} ${row['pm_insight']} ${row['yuanta_insight']}`.toLowerCase();
                    return h.includes(term);
                });
            }
            data.sort((a, b) => new Date(b['publish_date']) - new Date(a['publish_date']));

            if (data.length === 0) {
                container.innerHTML = "<p class='text-center text-gray-500 py-12'>這個區間沒有資料哦！</p>";
                return;
            }

            // Group by date
            const groups = {};
            const groupOrder = [];
            data.forEach(news => {
                const date = news['publish_date'] || '';
                if (!groups[date]) { groups[date] = []; groupOrder.push(date); }
                groups[date].push(news);
            });

            groupOrder.forEach((date, groupIndex) => {
                const domestic = groups[date].filter(n => isDomesticNews(n));
                const global   = groups[date].filter(n => !isDomesticNews(n));

                const domesticHTML = domestic.map(n => buildCard(n, true)).join('');
                const globalHTML   = global.map(n => buildCard(n, false)).join('');

                // Dot color cycles for visual variety
                const dotColors = ['bg-amber-600', 'bg-slate-500', 'bg-amber-500', 'bg-slate-600'];
                const dotColor = dotColors[groupIndex % dotColors.length];

                container.innerHTML += `
                    <!-- Desktop two-column row -->
                    <div class="hidden md:grid grid-cols-[1fr_60px_1fr] gap-0 mb-2">
                        <!-- Taiwan column -->
                        <div>${domesticHTML || ''}</div>

                        <!-- Center timeline -->
                        <div class="flex flex-col items-center">
                            <div class="w-0.5 bg-gray-300 flex-1 ${groupIndex === 0 ? 'mt-3' : ''}"></div>
                            <div class="w-5 h-5 rounded-full ${dotColor} border-4 border-white shadow-md flex-shrink-0 my-1"></div>
                            <div class="w-0.5 bg-gray-300 flex-1"></div>
                        </div>

                        <!-- Global column -->
                        <div>${globalHTML || ''}</div>
                    </div>

                    <!-- Mobile: stacked with date header -->
                    <div class="md:hidden mb-6">
                        <div class="flex items-center gap-2 mb-3">
                            <span class="bg-gray-200 text-gray-500 text-xs px-3 py-1 rounded-full">📅 ${date}</span>
                        </div>
                        ${domestic.length > 0 ? `
                            <div class="mb-2 flex items-center gap-2">
                                <span class="w-2.5 h-2.5 rounded-full bg-green-500 inline-block"></span>
                                <span class="text-xs font-bold text-green-700 uppercase tracking-wide">台灣市場</span>
                            </div>
                            ${domesticHTML}
                        ` : ''}
                        ${global.length > 0 ? `
                            <div class="mb-2 flex items-center gap-2 mt-3">
                                <span class="w-2.5 h-2.5 rounded-full bg-amber-500 inline-block"></span>
                                <span class="text-xs font-bold text-amber-700 uppercase tracking-wide">國際市場</span>
                            </div>
                            ${globalHTML}
                        ` : ''}
                    </div>
                `;
            });
        }

        window.addEventListener('DOMContentLoaded', initData);
    </script>
</body>
</html>
