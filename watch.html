<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 情報站 - Global Financial AI Watch</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 PapaParse 用於讀取 CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <!-- 導覽列 -->
    <nav class="bg-blue-900 text-white p-4 shadow-md">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">AI 情報站</h1>
            <div class="space-x-4">
                <a href="index.html" class="hover:text-blue-300">AI Trend Weekly</a>
                <a href="watch.html" class="hover:text-blue-300 border-b-2 border-white pb-1">Global Financial AI Watch</a>
                <a href="docs.html" class="hover:text-blue-300">AI Model Docs</a>
            </div>
        </div>
    </nav>

    <!-- 主要內容區 -->
    <main class="max-w-6xl mx-auto p-6 mt-6">
        
        <!-- 控制區：選擇週次 -->
        <div class="mb-10 flex items-center justify-between bg-white p-4 rounded-lg shadow-sm border border-gray-200">
            <h2 class="text-xl font-semibold text-gray-700">Global Financial AI Watch</h2>
            <div>
                <label for="weekSelector" class="mr-2 font-medium text-gray-600">選擇週次：</label>
                <select id="weekSelector" class="border border-gray-300 rounded p-2 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="ALL">全部顯示</option>
                </select>
            </div>
        </div>

        <!-- 標題圖示 -->
        <div class="text-center mb-8">
            <span class="inline-block bg-blue-100 text-blue-800 px-4 py-2 rounded-full font-bold shadow-sm">
                國內新聞 (Taiwan) vs 國外新聞 (Global)
            </span>
        </div>

        <!-- 雙軌時間軸區塊 -->
        <div class="relative wrap overflow-hidden p-4 h-full">
            <!-- 中央分隔線 -->
            <div class="absolute border-opacity-20 border-gray-400 border-l-2 h-full left-1/2 transform -translate-x-1/2"></div>
            
            <div id="timelineContainer" class="flex flex-col space-y-8">
                <!-- 卡片會由 JS 動態生成 -->
            </div>
        </div>

    </main>

    <script>
        // === 請將以下網址替換為你 finance_news 發佈的 CSV 網址 ===
        const URL_FINANCE = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSIk2DNeHriB4uTPLwvkQpPE8S-saggIUIIB1sidpnEfu-Tuf9oTqVqBEa0SW8dssXPFHiYznLmnxvh/pub?output=csv'; 

        let allFinanceData = [];
        let availableDates = [];

        function fetchCSV(url) {
            return new Promise((resolve, reject) => {
                Papa.parse(url, {
                    download: true,
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        resolve(results.data);
                    },
                    error: function(err) {
                        console.error("CSV 讀取錯誤:", err);
                        reject(err);
                    }
                });
            });
        }

        async function initData() {
            try {
                if(URL_FINANCE.includes('YOUR_')) {
                    document.getElementById('timelineContainer').innerHTML = "<p class='text-center text-red-500'>請先在程式碼中替換真實的 Google Sheet CSV 網址！</p>";
                    return;
                }

                allFinanceData = await fetchCSV(URL_FINANCE);

                // 提取所有不重複的日期並排序 (大到小)
                let dateSet = new Set();
                allFinanceData.forEach(row => {
                    if(row['日期']) dateSet.add(row['日期']);
                });
                availableDates = Array.from(dateSet).sort((a, b) => b.localeCompare(a));

                // 建立下拉選單
                const selector = document.getElementById('weekSelector');
                availableDates.forEach(date => {
                    const option = document.createElement('option');
                    option.value = date;
                    option.textContent = `${date.substring(0,4)}-${date.substring(4,6)}-${date.substring(6,8)} 週次`;
                    selector.appendChild(option);
                });

                // 監聽下拉選單改變事件
                selector.addEventListener('change', (e) => {
                    renderTimeline(e.target.value);
                });

                // 預設渲染「全部顯示」
                renderTimeline('ALL');

            } catch (error) {
                document.getElementById('timelineContainer').innerHTML = "<p class='text-center text-red-500'>讀取資料失敗，請檢查網址與網路連線。</p>";
            }
        }

        function renderTimeline(selectedDate) {
            const container = document.getElementById('timelineContainer');
            container.innerHTML = '';

            // 根據選單過濾資料
            let filteredData = allFinanceData;
            if (selectedDate !== 'ALL') {
                filteredData = allFinanceData.filter(row => row['日期'] === selectedDate);
            }

            // 確保資料依發布日期排序 (新到舊)
            filteredData.sort((a, b) => new Date(b['publish_date']) - new Date(a['publish_date']));

            if(filteredData.length === 0) {
                container.innerHTML = "<p class='text-center text-gray-500 w-full'>這個區間沒有資料哦！</p>";
                return;
            }

            filteredData.forEach(news => {
                // 判斷國內外 (Taiwan, Taipei 都算國內)
                const loc = (news['location'] || '').toLowerCase();
                const isDomestic = loc.includes('taiwan') || loc.includes('taipei');

                // 處理 PM Insight 中的 **粗體** 標記，轉為 HTML 粗體
                let rawInsight = news['pm_insight'] || '';
                let formattedInsight = rawInsight.replace(/\*\*(.*?)\*\*/g, '<span class="font-bold text-blue-700">$1</span>');

                // 決定卡片放在左邊還是右邊的樣式結構
                let timelineHTML = '';

                if (isDomestic) {
                    // 國內新聞：卡片在左側
                    timelineHTML = `
                        <div class="flex justify-between items-center w-full right-timeline">
                            <div class="order-1 w-5/12 pr-6 text-right">
                                <div class="bg-white rounded-xl shadow-md border border-gray-100 p-5 hover:shadow-lg transition">
                                    <div class="text-xs text-gray-400 mb-1">${news['publish_date']} | ${news['source_name']}</div>
                                    <h3 class="font-bold text-lg text-gray-800 mb-2">${news['title']}</h3>
                                    <span class="inline-block bg-blue-50 text-blue-600 text-xs px-2 py-1 rounded mb-3 font-medium">${news['main_company']}</span>
                                    <p class="text-sm text-gray-600 leading-relaxed mb-4 text-left">${news['summary']}</p>
                                    
                                    <div class="bg-blue-50/50 p-3 rounded border border-blue-100 text-left">
                                        <p class="text-sm text-gray-700">💡 ${formattedInsight}</p>
                                    </div>
                                    <div class="mt-3 text-left">
                                        <a href="${news['url']}" target="_blank" class="text-blue-500 text-xs hover:underline">閱讀原文 &rarr;</a>
                                    </div>
                                </div>
                            </div>
                            <div class="z-20 flex items-center order-1 bg-blue-500 shadow-xl w-4 h-4 rounded-full border-4 border-white"></div>
                            <div class="order-1 w-5/12"></div>
                        </div>
                    `;
                } else {
                    // 國外新聞：卡片在右側
                    timelineHTML = `
                        <div class="flex justify-between items-center w-full left-timeline flex-row-reverse">
                            <div class="order-1 w-5/12 pl-6 text-left">
                                <div class="bg-white rounded-xl shadow-md border border-gray-100 p-5 hover:shadow-lg transition">
                                    <div class="text-xs text-gray-400 mb-1">${news['publish_date']} | ${news['source_name']}</div>
                                    <h3 class="font-bold text-lg text-gray-800 mb-2">${news['title']}</h3>
                                    <span class="inline-block bg-indigo-50 text-indigo-600 text-xs px-2 py-1 rounded mb-3 font-medium">${news['main_company']}</span>
                                    <p class="text-sm text-gray-600 leading-relaxed mb-4">${news['summary']}</p>
                                    
                                    <div class="bg-indigo-50/50 p-3 rounded border border-indigo-100">
                                        <p class="text-sm text-gray-700">💡 ${formattedInsight}</p>
                                    </div>
                                    <div class="mt-3">
                                        <a href="${news['url']}" target="_blank" class="text-indigo-500 text-xs hover:underline">閱讀原文 &rarr;</a>
                                    </div>
                                </div>
                            </div>
                            <div class="z-20 flex items-center order-1 bg-indigo-500 shadow-xl w-4 h-4 rounded-full border-4 border-white"></div>
                            <div class="order-1 w-5/12"></div>
                        </div>
                    `;
                }
                
                container.innerHTML += timelineHTML;
            });
        }

        // 啟動程式
        window.addEventListener('DOMContentLoaded', initData);

    </script>
</body>
</html>
