<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 情報站 - AI Trend Weekly</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 PapaParse 用於讀取 CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        html { scroll-behavior: smooth; } /* 讓錨點跳轉有平滑滑動效果 */
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <!-- 導覽列 -->
    <nav class="bg-blue-900 text-white p-4 shadow-md">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">AI 情報站</h1>
            <!-- Desktop nav -->
            <div class="hidden md:flex space-x-4">
                <a href="index.html" class="hover:text-blue-300 border-b-2 border-white pb-1">AI Trend Weekly</a>
                <a href="watch.html" class="hover:text-blue-300">Global Financial AI Watch</a>
                <a href="docs.html" class="hover:text-blue-300">AI Model Docs</a>
            </div>
            <!-- Hamburger button -->
            <button id="menuToggle" class="md:hidden flex flex-col space-y-1.5 p-2" aria-label="Menu">
                <span class="block w-6 h-0.5 bg-white"></span>
                <span class="block w-6 h-0.5 bg-white"></span>
                <span class="block w-6 h-0.5 bg-white"></span>
            </button>
        </div>
        <!-- Mobile dropdown -->
        <div id="mobileMenu" class="hidden md:hidden mt-3 pb-2 border-t border-blue-700">
            <div class="max-w-6xl mx-auto flex flex-col space-y-3 pt-3">
                <a href="index.html" class="hover:text-blue-300 border-b-2 border-white pb-1 inline-block">AI Trend Weekly</a>
                <a href="watch.html" class="hover:text-blue-300">Global Financial AI Watch</a>
                <a href="docs.html" class="hover:text-blue-300">AI Model Docs</a>
            </div>
        </div>
    </nav>

    <!-- 主要內容區 -->
    <main class="max-w-6xl mx-auto p-6 mt-6">

        <div class="flex gap-6 items-start">

            <!-- 左側文章導覽欄 (桌面版 lg+) -->
            <aside class="hidden lg:block w-52 flex-shrink-0">
                <div id="sidebarInner" class="sticky top-6 bg-white rounded-xl shadow-sm border border-gray-200 p-4 max-h-[calc(100vh-5rem)] overflow-y-auto">
                    <h3 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-3 flex items-center gap-2">
                        <svg class="w-4 h-4 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h8"></path>
                        </svg>
                        本頁導覽
                    </h3>
                    <nav id="articleNavList" class="space-y-0.5">
                        <p class="text-xs text-gray-400 italic">載入中...</p>
                    </nav>
                </div>
            </aside>

            <!-- 主要內容 -->
            <div class="flex-1 min-w-0">

        <!-- 控制區：選擇週次 -->
        <div class="mb-6 flex flex-col sm:flex-row gap-4 items-start sm:items-center justify-between bg-white p-4 rounded-lg shadow-sm border border-gray-200">
            <h2 class="text-xl font-semibold text-gray-700">AI Trend Weekly</h2>
            <div>
                <label for="weekSelector" class="mr-2 font-medium text-gray-600">選擇週次：</label>
                <select id="weekSelector" class="border border-gray-300 rounded p-2 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">載入中...</option>
                </select>
            </div>
        </div>

        <!-- 搜尋列 -->
        <div class="mb-4 relative">
            <input type="text" id="newsSearchInput" placeholder="搜尋新聞標題或摘要關鍵字..."
                   class="w-full pl-12 pr-10 py-3 rounded-xl border border-gray-300 bg-white focus:ring-2 focus:ring-blue-400 focus:outline-none shadow-sm text-sm">
            <svg class="w-5 h-5 text-gray-400 absolute left-4 top-3.5 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
            <button id="clearSearch" class="hidden absolute right-3 top-3 text-gray-400 hover:text-gray-600 p-0.5" aria-label="清除搜尋">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>
        <div id="searchResultCount" class="hidden mb-4 text-sm text-gray-500"></div>

        <!-- 區塊一：本週總結 (AI_weekly_summary_text) -->
        <div id="section-summary" class="scroll-mt-20"></div>
        <div id="summarySection" class="bg-gradient-to-r from-blue-50 to-indigo-50 p-6 rounded-xl shadow-sm border border-blue-100 mb-10">
            <h3 class="text-lg font-bold text-blue-800 mb-3 flex items-center">
                <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20"><path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"/><path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 100 2h.01a1 1 0 100-2H7zm3 0a1 1 0 100 2h3a1 1 0 100-2h-3z" clip-rule="evenodd"/></svg>
                本週總結
            </h3>
            <p id="summaryText" class="text-gray-700 leading-relaxed text-lg">資料載入中...</p>
        </div>

        <!-- 區塊二：新聞亮點 (AI_Weekly_related_news) -->
        <h3 id="section-news" class="text-2xl font-bold text-gray-800 mb-4 border-l-4 border-blue-600 pl-3 scroll-mt-20">Related News</h3>
        <div id="relatedNewsContainer" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <!-- 卡片會由 JS 動態生成 -->
        </div>

        <!-- 區塊三：深度文章區 (AI_Weekly_articles) -->
        <h3 id="section-articles" class="text-2xl font-bold text-gray-800 mb-4 border-l-4 border-indigo-600 pl-3 scroll-mt-20">Articles & Insights</h3>
        <div id="articlesContainer" class="space-y-8 mb-20">
            <!-- 文章詳細內容會由 JS 動態生成 -->
        </div>

            </div><!-- end 主要內容 -->
        </div><!-- end flex wrapper -->
    </main>

    <!-- 手機版浮動導覽按鈕 (FAB) -->
    <button id="mobileNavFab" class="lg:hidden fixed bottom-6 right-6 z-40 bg-indigo-600 hover:bg-indigo-700 text-white rounded-full w-14 h-14 shadow-lg flex items-center justify-center transition-colors" aria-label="文章導覽">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h8"></path>
        </svg>
    </button>

    <!-- 手機版抽屜 -->
    <div id="mobileNavDrawer" class="lg:hidden fixed inset-0 z-50 hidden">
        <div id="mobileNavOverlay" class="absolute inset-0 bg-black/50"></div>
        <div class="absolute left-0 top-0 h-full w-72 bg-white shadow-xl flex flex-col">
            <div class="flex justify-between items-center p-4 border-b border-gray-200 flex-shrink-0">
                <h3 class="font-bold text-gray-800 flex items-center gap-2">
                    <svg class="w-4 h-4 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h8"></path>
                    </svg>
                    本頁導覽
                </h3>
                <button id="closeNavDrawer" class="text-gray-400 hover:text-gray-600 p-1" aria-label="關閉">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            <nav id="mobileArticleNavList" class="flex-1 overflow-y-auto p-4 space-y-0.5">
                <p class="text-xs text-gray-400 italic">載入中...</p>
            </nav>
        </div>
    </div>

    <script>
        // === 請將以下三個網址替換為你真實發佈的 CSV 網址 ===
        const URL_SUMMARY = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTr9-gJY0KJtnHhuqaTVasx85VvgjR3eIBBO-BvjD386spMzBGnhoXiuK4KXmm6Ug1XD69I8gnr6eF0/pub?output=csv';
        const URL_NEWS = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTd_5CX7qteXoHpQGPFnn6n3yJUGurkVNP6LJ38_DaLXYhbrpRqC7Ksi8vSV5GHzHbnKhvC6FqvTYLA/pub?output=csv';
        const URL_ARTICLES = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRqZnYWyOsOMfJUDaQA3STV-TCqisCr-05roCOMlVT8WtR5U3IlbrmJPs1d49t6rRCVE9iZl63aYg-m/pub?output=csv';

        let allData = { summary: [], news: [], articles: [] };
        let availableDates = [];
        let currentSearchTerm = '';
        let currentWeekNews = [];
        let currentSelectedDate = '';

        // Hamburger menu
        document.getElementById('menuToggle').addEventListener('click', () => {
            document.getElementById('mobileMenu').classList.toggle('hidden');
        });

        // Search input events
        const newsSearchInput = document.getElementById('newsSearchInput');
        const clearSearch = document.getElementById('clearSearch');

        newsSearchInput.addEventListener('input', (e) => {
            currentSearchTerm = e.target.value;
            clearSearch.classList.toggle('hidden', !currentSearchTerm);
            const newsSource = currentSearchTerm ? allData.news : currentWeekNews;
            renderNewsCards(newsSource, currentSelectedDate, currentSearchTerm);
        });

        clearSearch.addEventListener('click', () => {
            newsSearchInput.value = '';
            currentSearchTerm = '';
            clearSearch.classList.add('hidden');
            renderNewsCards(currentWeekNews, currentSelectedDate, '');
        });

        // 使用 Promise 包裝 PapaParse 以確保三個檔案都讀取完畢
        function fetchCSV(url) {
            return new Promise((resolve, reject) => {
                Papa.parse(url, {
                    download: true,
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        resolve(results.data);
                    },
                    error: function(err) {
                        console.error("CSV 讀取錯誤:", err);
                        reject(err);
                    }
                });
            });
        }

        async function initData() {
            try {
                if(URL_SUMMARY.includes('YOUR_')) {
                    document.getElementById('summaryText').innerText = "請先在程式碼中替換真實的 Google Sheet CSV 網址哦！";
                    return;
                }

                const [summaryData, newsData, articlesData] = await Promise.all([
                    fetchCSV(URL_SUMMARY),
                    fetchCSV(URL_NEWS),
                    fetchCSV(URL_ARTICLES)
                ]);

                allData.summary = summaryData;
                allData.news = newsData;
                allData.articles = articlesData;

                // 提取所有不重複的日期並排序 (大到小，最新的在最上面)
                let dateSet = new Set();
                summaryData.forEach(row => dateSet.add(row['日期']));
                availableDates = Array.from(dateSet).sort((a, b) => b.localeCompare(a));

                // 建立下拉選單
                const selector = document.getElementById('weekSelector');
                selector.innerHTML = '';
                availableDates.forEach(date => {
                    const option = document.createElement('option');
                    option.value = date;
                    option.textContent = `${date.substring(0,4)}-${date.substring(4,6)}-${date.substring(6,8)} 週次`;
                    selector.appendChild(option);
                });

                // 監聽下拉選單改變事件
                selector.addEventListener('change', (e) => {
                    renderPage(e.target.value);
                });

                // 預設渲染最新的一週
                if (availableDates.length > 0) {
                    renderPage(availableDates[0]);
                } else {
                    document.getElementById('summaryText').innerText = "找不到資料，請檢查試算表內容。";
                }

            } catch (error) {
                document.getElementById('summaryText').innerText = "讀取資料失敗，請檢查網址與網路連線。";
            }
        }

        // 解析 impact_analysis 欄位 (說明: ... 標的: ...)
        function parseImpactField(text) {
            if (!text) return { description: '', targets: [] };
            const parts = text.split('標的:');
            const description = parts[0].replace(/^說明[:：]\s*/, '').trim();
            const targets = parts[1]
                ? parts[1].split(/[、,，]/).map(t => t.trim()).filter(Boolean)
                : [];
            return { description, targets };
        }

        // 搜尋文字高亮輔助函數
        function escapeRegExp(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function highlightText(text, searchTerm) {
            if (!searchTerm || !text) return text || '';
            const escaped = escapeRegExp(searchTerm);
            const regex = new RegExp(`(${escaped})`, 'gi');
            return text.replace(regex, '<mark class="bg-yellow-200 rounded px-0.5">$1</mark>');
        }

        // 渲染新聞卡片（支援搜尋過濾與高亮）
        function renderNewsCards(weekNews, selectedDate, searchTerm) {
            const newsContainer = document.getElementById('relatedNewsContainer');
            const searchResultCount = document.getElementById('searchResultCount');
            newsContainer.innerHTML = '';

            const isGlobalSearch = searchTerm && weekNews === allData.news;

            let filtered = weekNews;
            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                filtered = weekNews.filter(news => {
                    const haystack = `${news['title']} ${news['summary']}`.toLowerCase();
                    return haystack.includes(term);
                });
                searchResultCount.classList.remove('hidden');
                if (isGlobalSearch) {
                    searchResultCount.textContent = `找到 ${filtered.length} 筆結果（共 ${allData.news.length} 則新聞，跨所有週次）`;
                } else {
                    searchResultCount.textContent = `找到 ${filtered.length} 筆結果（共 ${weekNews.length} 則新聞）`;
                }
            } else {
                searchResultCount.classList.add('hidden');
            }

            if (filtered.length === 0 && searchTerm) {
                newsContainer.innerHTML = `<div class="col-span-full text-center text-gray-500 py-8">找不到符合「${searchTerm}」的新聞</div>`;
                return;
            }

            filtered.forEach((news) => {
                const originalIndex = weekNews.indexOf(news);
                const newsDate = news['日期'];
                const targetArticleId = `article-${newsDate}-${originalIndex}`;

                const title = highlightText(news['title'], searchTerm);
                const summary = highlightText(news['summary'], searchTerm);

                const dateBadgeHtml = isGlobalSearch && newsDate
                    ? `<div class="mb-2"><span class="inline-block bg-gray-100 text-gray-500 text-xs px-2 py-0.5 rounded">${newsDate.substring(0,4)}-${newsDate.substring(4,6)}-${newsDate.substring(6,8)}</span></div>`
                    : '';

                const learnMoreHtml = (!isGlobalSearch || newsDate === selectedDate)
                    ? `<button onclick="expandArticle('${targetArticleId}')" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium py-1.5 px-4 rounded transition-colors">瞭解更多 ↓</button>`
                    : '';

                const newsCard = `
                    <div class="bg-white rounded-lg shadow hover:shadow-lg transition-shadow duration-300 p-5 border border-gray-100 flex flex-col justify-between">
                        <div>
                            ${dateBadgeHtml}
                            <h4 class="text-lg font-bold text-gray-800 mb-2">${title}</h4>
                            <p class="text-gray-600 text-sm mb-4">${summary}</p>
                        </div>
                        <div class="flex justify-between items-center mt-4 pt-4 border-t border-gray-100">
                            <a href="${news['url']}" target="_blank" class="text-xs text-blue-500 hover:underline">原文連結</a>
                            ${learnMoreHtml}
                        </div>
                    </div>
                `;
                newsContainer.innerHTML += newsCard;
            });
        }

        function renderPage(selectedDate) {
            // 重設搜尋狀態
            currentSelectedDate = selectedDate;
            newsSearchInput.value = '';
            currentSearchTerm = '';
            clearSearch.classList.add('hidden');
            document.getElementById('searchResultCount').classList.add('hidden');

            // 1. 渲染 Summary
            const weekSummary = allData.summary.find(row => row['日期'] === selectedDate);
            document.getElementById('summaryText').innerText = weekSummary ? weekSummary['summary_text'] : "本週無總結資料。";

            // 2. 渲染 Related News 卡片
            const weekNews = allData.news.filter(row => row['日期'] === selectedDate);
            currentWeekNews = weekNews;
            renderNewsCards(weekNews, selectedDate, '');

            // 3. 渲染 Articles 深度文章
            const weekArticles = allData.articles.filter(row => row['日期'] === selectedDate);
            const articlesContainer = document.getElementById('articlesContainer');
            articlesContainer.innerHTML = '';

            weekArticles.forEach((article, index) => {
                const articleId = `article-${selectedDate}-${index}`;

                // 處理 Hashtags — 白色半透明 pill（放在漸層標頭中）
                let hashtagsHtml = '';
                if(article['hashtags']) {
                    const tags = article['hashtags'].split(',').map(tag => tag.trim());
                    hashtagsHtml = tags.map(tag =>
                        `<span class="inline-block bg-white/20 border border-white/30 text-white rounded-full px-3 py-1 text-xs font-semibold">${tag}</span>`
                    ).join('');
                }

                // 細節重點 — SVG checkmark icon
                const detailPointsFormatted = article['detail_points']
                    ? article['detail_points'].split('\n').filter(p => p.trim()).map(point => `
                        <li class="flex items-start gap-2 text-sm text-gray-700">
                            <svg class="w-4 h-4 text-indigo-500 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                            </svg>
                            <span>${point}</span>
                        </li>
                    `).join('')
                    : '';

                const articleBlock = `
                    <div id="${articleId}" class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-200 scroll-mt-24">

                        <!-- 漸層標頭 (可點擊展開/收起) -->
                        <div class="bg-gradient-to-r from-indigo-700 to-blue-600 p-5 relative overflow-hidden cursor-pointer select-none" onclick="toggleArticle('${articleId}')">
                            <!-- 裝飾圓形 -->
                            <div class="absolute top-0 right-0 w-32 h-32 rounded-full bg-white/10 -mr-10 -mt-10 pointer-events-none"></div>
                            <div class="absolute bottom-0 right-20 w-20 h-20 rounded-full bg-white/10 -mb-8 pointer-events-none"></div>
                            <!-- 編號 + 標題 -->
                            <div class="flex items-start gap-3 relative">
                                <span class="flex-shrink-0 w-8 h-8 bg-white/20 rounded-full flex items-center justify-center text-white font-bold text-sm">${index + 1}</span>
                                <h3 class="text-xl font-bold text-white leading-snug flex-1">${article['title']}</h3>
                                <span class="article-chevron flex-shrink-0 mt-1 text-white/80" style="transition: transform 0.3s;">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                                    </svg>
                                </span>
                            </div>
                            ${hashtagsHtml ? `<div class="mt-3 flex flex-wrap gap-2 relative">${hashtagsHtml}</div>` : ''}
                        </div>

                        <div class="article-body hidden">
                        <div class="p-6">
                            <!-- 新聞摘要 + 細節重點 -->
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                                <div>
                                    <div class="flex items-center gap-2 mb-3">
                                        <div class="w-7 h-7 bg-blue-100 rounded-lg flex items-center justify-center flex-shrink-0">
                                            <svg class="w-4 h-4 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                                            </svg>
                                        </div>
                                        <h4 class="font-bold text-gray-800">新聞摘要 (Highlight)</h4>
                                    </div>
                                    <p class="text-gray-700 text-sm leading-relaxed">${article['highlight']}</p>
                                </div>
                                <div>
                                    <div class="flex items-center gap-2 mb-3">
                                        <div class="w-7 h-7 bg-indigo-100 rounded-lg flex items-center justify-center flex-shrink-0">
                                            <svg class="w-4 h-4 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path>
                                            </svg>
                                        </div>
                                        <h4 class="font-bold text-gray-800">細節重點 (Detail Points)</h4>
                                    </div>
                                    <ul class="space-y-2">
                                        ${detailPointsFormatted}
                                    </ul>
                                </div>
                            </div>

                            <!-- PM Insight：左邊框 + 漸層背景 -->
                            <div class="bg-gradient-to-r from-blue-50 to-indigo-50 rounded-lg p-5 mb-6 border-l-4 border-blue-500">
                                <div class="flex items-center gap-2 mb-2">
                                    <div class="w-7 h-7 bg-blue-500 rounded-full flex items-center justify-center flex-shrink-0">
                                        <span class="text-white text-sm leading-none">💡</span>
                                    </div>
                                    <h4 class="font-bold text-blue-800">PM Insight</h4>
                                </div>
                                <p class="text-gray-700 text-sm leading-relaxed">${article['pm_insight']}</p>
                            </div>

                            <!-- 受惠 / 受損分析 -->
                            ${(() => {
                                const benefited = parseImpactField(article['impact_analysis_benefited']);
                                const damaged = parseImpactField(article['impact_analysis_damaged']);
                                const benefitedChips = benefited.targets.map(t =>
                                    `<span class="inline-block bg-green-100 text-green-800 border border-green-300 rounded-full px-3 py-0.5 text-xs font-medium mr-1 mb-1">${t}</span>`
                                ).join('');
                                const damagedChips = damaged.targets.map(t =>
                                    `<span class="inline-block bg-red-100 text-red-800 border border-red-300 rounded-full px-3 py-0.5 text-xs font-medium mr-1 mb-1">${t}</span>`
                                ).join('');
                                return `
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div class="bg-green-50 rounded-lg p-4">
                                    <div class="flex items-center gap-2 mb-2">
                                        <div class="w-7 h-7 bg-green-500 rounded-full flex items-center justify-center flex-shrink-0">
                                            <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 20 20">
                                                <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
                                            </svg>
                                        </div>
                                        <h4 class="font-bold text-green-800">受惠分析 (Benefited)</h4>
                                    </div>
                                    <p class="text-sm text-green-900 mb-2">${benefited.description}</p>
                                    ${benefitedChips ? `<div class="flex flex-wrap mt-1"><span class="text-xs text-green-700 font-semibold mr-2 mt-1">標的</span>${benefitedChips}</div>` : ''}
                                </div>
                                <div class="bg-red-50 rounded-lg p-4">
                                    <div class="flex items-center gap-2 mb-2">
                                        <div class="w-7 h-7 bg-red-500 rounded-full flex items-center justify-center flex-shrink-0">
                                            <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 20 20">
                                                <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
                                            </svg>
                                        </div>
                                        <h4 class="font-bold text-red-800">受損分析 (Damaged)</h4>
                                    </div>
                                    <p class="text-sm text-red-900 mb-2">${damaged.description}</p>
                                    ${damagedChips ? `<div class="flex flex-wrap mt-1"><span class="text-xs text-red-700 font-semibold mr-2 mt-1">標的</span>${damagedChips}</div>` : ''}
                                </div>
                            </div>`;
                            })()}
                        </div>
                        </div>
                    </div>
                `;
                articlesContainer.innerHTML += articleBlock;
            });

            // 更新左側 / 手機版導覽選單
            updateArticleNav(weekArticles, selectedDate);
        }

        // === 文章導覽選單 ===
        const NAV_SECTIONS = [
            { id: 'section-summary', label: '本週總結', icon: '📋' },
            { id: 'section-news',    label: 'Related News', icon: '📰' },
            { id: 'section-articles', label: 'Articles & Insights', icon: '📝' },
        ];

        function buildNavHtml(weekArticles, selectedDate) {
            const sectionLinks = NAV_SECTIONS.map(s =>
                `<a href="#${s.id}" class="nav-section-link flex items-center gap-1.5 text-xs py-1.5 px-2 rounded-lg text-gray-500 hover:bg-gray-100 hover:text-gray-800 transition-colors font-medium">
                    <span>${s.icon}</span><span>${s.label}</span>
                </a>`
            ).join('');

            const divider = weekArticles.length
                ? `<div class="my-2 border-t border-gray-100"></div>
                   <p class="text-[10px] font-bold text-gray-400 uppercase tracking-wider px-2 mb-1">文章列表</p>`
                : '';

            const articleLinks = weekArticles.map((article, index) => {
                const articleId = `article-${selectedDate}-${index}`;
                return `<a href="#${articleId}"
                           class="article-nav-link flex items-start gap-1.5 text-xs py-1.5 px-2 rounded-lg text-gray-600 hover:bg-indigo-50 hover:text-indigo-700 transition-colors"
                           data-article-id="${articleId}"
                           onclick="event.preventDefault(); expandArticle('${articleId}')">
                            <span class="text-gray-400 font-mono flex-shrink-0 mt-0.5">${index + 1}.</span>
                            <span class="line-clamp-2 leading-snug">${article['title']}</span>
                        </a>`;
            }).join('');

            return sectionLinks + divider + articleLinks;
        }

        function updateArticleNav(weekArticles, selectedDate) {
            const html = buildNavHtml(weekArticles, selectedDate);
            document.getElementById('articleNavList').innerHTML = html || '<p class="text-xs text-gray-400 italic">本週無文章</p>';
            document.getElementById('mobileArticleNavList').innerHTML = html || '<p class="text-xs text-gray-400 italic">本週無文章</p>';

            // 手機版：點擊連結後關閉抽屜
            document.getElementById('mobileArticleNavList').querySelectorAll('a').forEach(link => {
                link.addEventListener('click', () => {
                    document.getElementById('mobileNavDrawer').classList.add('hidden');
                });
            });

            setupScrollSpy();
        }

        // Scroll Spy：追蹤目前閱讀到的文章
        let scrollObserver = null;
        function setupScrollSpy() {
            if (scrollObserver) scrollObserver.disconnect();
            const allNavLinks = document.querySelectorAll('.article-nav-link');
            if (!allNavLinks.length) return;

            scrollObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const id = entry.target.id;
                        allNavLinks.forEach(link => {
                            const isActive = link.dataset.articleId === id;
                            link.classList.toggle('bg-indigo-50', isActive);
                            link.classList.toggle('text-indigo-700', isActive);
                            link.classList.toggle('font-semibold', isActive);
                        });
                    }
                });
            }, { rootMargin: '-10% 0px -70% 0px', threshold: 0 });

            document.querySelectorAll('[id^="article-"]').forEach(el => scrollObserver.observe(el));
        }

        // 手機版抽屜控制
        document.getElementById('mobileNavFab').addEventListener('click', () => {
            document.getElementById('mobileNavDrawer').classList.remove('hidden');
        });
        document.getElementById('closeNavDrawer').addEventListener('click', () => {
            document.getElementById('mobileNavDrawer').classList.add('hidden');
        });
        document.getElementById('mobileNavOverlay').addEventListener('click', () => {
            document.getElementById('mobileNavDrawer').classList.add('hidden');
        });

        // === 文章展開/收起 ===
        function toggleArticle(articleId) {
            const articleEl = document.getElementById(articleId);
            if (!articleEl) return;
            const body = articleEl.querySelector('.article-body');
            const chevron = articleEl.querySelector('.article-chevron');
            if (body) {
                const isHidden = body.classList.contains('hidden');
                body.classList.toggle('hidden');
                if (chevron) chevron.style.transform = isHidden ? 'rotate(180deg)' : '';
            }
        }

        function expandArticle(articleId) {
            const articleEl = document.getElementById(articleId);
            if (!articleEl) return;
            const body = articleEl.querySelector('.article-body');
            const chevron = articleEl.querySelector('.article-chevron');
            if (body && body.classList.contains('hidden')) {
                body.classList.remove('hidden');
                if (chevron) chevron.style.transform = 'rotate(180deg)';
            }
            setTimeout(() => {
                articleEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 80);
        }

        // 啟動程式
        window.addEventListener('DOMContentLoaded', initData);

    </script>
</body>
</html>
