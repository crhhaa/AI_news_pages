        // 監聽搜尋輸入
        newsSearchInput.addEventListener('input', (e) => {
            currentSearchTerm = e.target.value;

            // 取得需要操作的區塊
            const summarySection = document.getElementById('summarySection');
            const relatedNewsContainer = document.getElementById('relatedNewsContainer');
            const searchResultCount = document.getElementById('searchResultCount');

            if (currentSearchTerm) {
                // 搜尋時：隱藏本週摘要與 Related News，專注顯示「所有深度文章」的搜尋結果
                summarySection.style.display = 'none';
                relatedNewsContainer.style.display = 'none';
                searchResultCount.classList.remove('hidden');

                const term = currentSearchTerm.toLowerCase();
                // 從所有深度文章 (allData.articles) 中進行跨週次全局搜尋
                currentWeekArticles = allData.articles.filter(art => {
                    // 擴大搜尋範圍：標題、亮點、細節、PM Insight 都納入搜尋
                    const content = `${art['title'] || ''} ${art['highlight'] || ''} ${art['detail_points'] || ''} ${art['pm_insight'] || ''}`.toLowerCase();
                    return content.includes(term);
                });
                
                searchResultCount.textContent = `在所有深度文章中找到 ${currentWeekArticles.length} 筆結果`;

            } else {
                // 清空搜尋時：恢復顯示本週摘要與 Related News
                summarySection.style.display = 'block';
                relatedNewsContainer.style.display = 'grid'; // 恢復網格排版
                searchResultCount.classList.add('hidden');
                
                // 恢復顯示當週深度文章
                currentWeekArticles = allData.articles.filter(row => row['日期'] === currentSelectedDate);
            }

            // 重新渲染左側文章列表
            renderArticleList();
            
            // 自動顯示搜尋結果的第一篇文章，或顯示無結果提示
            if (currentWeekArticles.length > 0) {
                showArticleDetail(0);
            } else {
                document.getElementById('articleDetailPane').innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center text-gray-400 py-20">
                        <svg class="w-12 h-12 mb-3 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        <p>找不到符合「${currentSearchTerm}」的深度文章</p>
                    </div>`;
            }
        });

        // 監聽清除搜尋按鈕
        clearSearch.addEventListener('click', () => {
            newsSearchInput.value = '';
            // 手動觸發 input 事件，讓上面的邏輯自動幫我們恢復預設狀態
            newsSearchInput.dispatchEvent(new Event('input')); 
        });

        

        function fetchCSV(url) {
            return new Promise((resolve, reject) => {
                Papa.parse(url, {
                    download: true,
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) { resolve(results.data); },
                    error: function(err) { console.error("CSV 讀取錯誤:", err); reject(err); }
                });
            });
        }

        async function initData() {
            try {
                if(URL_SUMMARY.includes('YOUR_')) {
                    document.getElementById('summaryText').innerText = "請先在程式碼中替換真實的 Google Sheet CSV 網址哦！";
                    return;
                }

                const [summaryData, newsData, articlesData] = await Promise.all([
                    fetchCSV(URL_SUMMARY), fetchCSV(URL_NEWS), fetchCSV(URL_ARTICLES)
                ]);

                allData.summary = summaryData;
                allData.news = newsData;
                allData.articles = articlesData;

                let dateSet = new Set();
                summaryData.forEach(row => dateSet.add(row['日期']));
                availableDates = Array.from(dateSet).sort((a, b) => b.localeCompare(a));

                const selector = document.getElementById('weekSelector');
                selector.innerHTML = '';
                availableDates.forEach(date => {
                    const option = document.createElement('option');
                    option.value = date;
                    const y = date.substring(0,4), m = date.substring(4,6), d = date.substring(6,8);
                    option.textContent = `${y} 年 ${m} 月 ${d} 日 當週`;
                    selector.appendChild(option);
                });

                selector.addEventListener('change', (e) => {
                    renderPage(e.target.value);
                });

                if (availableDates.length > 0) {
                    renderPage(availableDates[0]);
                } else {
                    document.getElementById('summaryText').innerText = "找不到資料，請檢查試算表內容。";
                }

            } catch (error) {
                document.getElementById('summaryText').innerText = "讀取資料失敗，請檢查網址與網路連線。";
            }
        }

        // 格式化日期顯示輔助
        function formatSubtitle(dateStr) {
            if(!dateStr || dateStr.length < 8) return "洞察·趨勢";
            return `洞察·趨勢 | ${dateStr.substring(0,4)} 年 ${dateStr.substring(4,6)} 月`;
        }

        // 分割標的，忽略括號內的分隔符
        function splitTargets(str) {
            const results = [];
            let depth = 0;
            let current = '';
            for (const ch of str) {
                if (ch === '（' || ch === '(') { depth++; current += ch; }
                else if (ch === '）' || ch === ')') { depth--; current += ch; }
                else if (depth === 0 && /[、,，]/.test(ch)) {
                    const t = current.trim();
                    if (t) results.push(t);
                    current = '';
                } else {
                    current += ch;
                }
            }
            const t = current.trim();
            if (t) results.push(t);
            return results;
        }

        // 解析 impact_analysis
        function parseImpactField(text) {
            if (!text) return { description: '', targets: [] };
            const parts = text.split('標的:');
            const description = parts[0].replace(/^說明[:：]\s*/, '').trim();
            const targets = parts[1] ? splitTargets(parts[1]) : [];
            return { description, targets };
        }

        function escapeRegExp(string) { return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
        function highlightText(text, searchTerm) {
            if (!searchTerm || !text) return text || '';
            const escaped = escapeRegExp(searchTerm);
            const regex = new RegExp(`(${escaped})`, 'gi');
            return text.replace(regex, '<mark class="bg-yellow-200 rounded px-0.5">$1</mark>');
        }

        // 渲染上方的新聞卡片 (3欄設計)
        function renderNewsCards(weekNews, selectedDate, searchTerm) {
            const newsContainer = document.getElementById('relatedNewsContainer');
            const searchResultCount = document.getElementById('searchResultCount');
            newsContainer.innerHTML = '';

            const isGlobalSearch = searchTerm && weekNews === allData.news;
            let filtered = weekNews;

            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                filtered = weekNews.filter(news => `${news['title']} ${news['summary']}`.toLowerCase().includes(term));
                searchResultCount.classList.remove('hidden');
                searchResultCount.textContent = isGlobalSearch 
                    ? `找到 ${filtered.length} 筆結果（跨所有週次）` 
                    : `找到 ${filtered.length} 筆結果（本週）`;
            } else {
                searchResultCount.classList.add('hidden');
            }

            if (filtered.length === 0) {
                newsContainer.innerHTML = `<div class="col-span-full text-center text-gray-500 py-8">無相關新聞資料</div>`;
                return;
            }

            filtered.forEach((news) => {
                const title = highlightText(news['title'], searchTerm);
                const summary = highlightText(news['summary'], searchTerm);
                
                // 完全依照要求補上的閱讀原文 HTML 結構
                // const exactReadMoreHtml = news['url'] ? `<a href="${news['url']}" target="_blank" class="text-xs text-red-600 hover:underline mt-1 inline-block">閱讀原文 &rarr;</a>` : '';
                // 取得該筆新聞在當週陣列中的原始索引，用來對應下方的深度文章
                const originalIndex = weekNews.indexOf(news);
                
                // 將「閱讀原文」改成「了解更多」，並加上點擊切換文章與滾動的動作
                const exactReadMoreHtml = `<button onclick="showArticleDetail(${originalIndex}); document.getElementById('articlesSplitView').scrollIntoView({ behavior: 'smooth', block: 'start' });" class="text-xs text-orange-500 hover:underline mt-1 inline-block text-left cursor-pointer transition-colors">了解更多 &rarr;</button>`;

                const newsCard = `
                    <div class="bg-white rounded-xl shadow-sm hover:shadow-md transition-all duration-300 p-6 border border-gray-200 flex flex-col h-full relative overflow-hidden group">
                        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 to-orange-400 transform origin-left scale-x-0 group-hover:scale-x-100 transition-transform duration-300"></div>
                        <h4 class="text-base font-bold text-gray-800 mb-3 leading-snug">${title}</h4>
                        <ul class="text-gray-600 text-sm mb-4 space-y-1.5 flex-1 list-disc pl-4">
                            <li>${summary}</li>
                        </ul>
                        <div class="mt-auto pt-3 border-t border-gray-100">
                            ${exactReadMoreHtml}
                        </div>
                    </div>
                `;
                newsContainer.innerHTML += newsCard;
            });
        }

        // 主頁面渲染
        function renderPage(selectedDate) {
            currentSelectedDate = selectedDate;
            newsSearchInput.value = '';
            currentSearchTerm = '';
            clearSearch.classList.add('hidden');
            document.getElementById('searchResultCount').classList.add('hidden');

            // Header 副標題更新
            document.getElementById('headerSubtitle').innerText = formatSubtitle(selectedDate);

            // 1. Summary
            const weekSummary = allData.summary.find(row => row['日期'] === selectedDate);
            document.getElementById('summaryText').innerText = weekSummary ? weekSummary['summary_text'] : "本週無總結資料。";

            // 2. News Cards
            const weekNews = allData.news.filter(row => row['日期'] === selectedDate);
            currentWeekNews = weekNews;
            renderNewsCards(weekNews, selectedDate, '');

            // 3. Articles (Split View)
            currentWeekArticles = allData.articles.filter(row => row['日期'] === selectedDate);
            renderArticleList();
            
            if(currentWeekArticles.length > 0) {
                showArticleDetail(0);
            } else {
                document.getElementById('articleDetailPane').innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center text-gray-400 py-20">
                        <svg class="w-12 h-12 mb-3 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>
                        <p>本週尚無深度文章資料</p>
                    </div>`;
            }
        }

// 渲染左側文章列表 (加入搜尋關鍵字高亮)
        function renderArticleList() {
            const pane = document.getElementById('articleListPane');
            if(!currentWeekArticles.length) {
                pane.innerHTML = '';
                return;
            }

            pane.innerHTML = currentWeekArticles.map((art, index) => {
                const num = String(index + 1).padStart(2, '0');
                
                // 套用高亮函式
                const displayTitle = highlightText(art['title'], currentSearchTerm);
                const displayHighlightText = highlightText(art['highlight'], currentSearchTerm);

                return `
                <div class="article-list-item cursor-pointer p-4 bg-white rounded-xl border border-gray-200 hover:border-blue-400 hover:shadow-md transition-all flex flex-col gap-2 relative overflow-hidden group flex-shrink-0 h-auto" data-index="${index}" onclick="showArticleDetail(${index})">
                    <div class="absolute left-0 top-0 bottom-0 w-1 bg-orange-500 opacity-0 group-[.active]:opacity-100 transition-opacity"></div>
                    <div class="text-blue-700 font-extrabold text-lg">${num}.</div>
                    <h4 class="font-bold text-gray-800 text-sm leading-snug group-[.active]:text-blue-800 transition-colors">${displayTitle}</h4>
                    <p class="text-xs text-gray-500 line-clamp-2 mt-1 leading-relaxed">${displayHighlightText}</p>
                </div>
                `;
            }).join('');
        }

// 渲染右側文章詳細內容 (加入搜尋關鍵字高亮與發布日期)
        function showArticleDetail(index) {
            // 更新左側 Active 狀態
            document.querySelectorAll('.article-list-item').forEach(el => {
                const isMatch = parseInt(el.dataset.index) === index;
                el.classList.toggle('active', isMatch);
                el.classList.toggle('ring-1', isMatch);
                el.classList.toggle('ring-blue-500', isMatch);
                el.classList.toggle('bg-blue-50/50', isMatch);
                el.classList.toggle('border-blue-300', isMatch);
            });

            const article = currentWeekArticles[index];
            if (!article) return;

            // 套用高亮到各個主要文字區塊
            const displayTitle = highlightText(article['title'], currentSearchTerm);
            const displayHighlightText = highlightText(article['highlight'], currentSearchTerm);
            const displayPmInsight = highlightText(article['pm_insight'], currentSearchTerm);

            // 處理日期格式 (優先找 '發布日期'，若無則用 '日期')
            let rawDate = article['發布日期'] || article['日期'] || '';
            let formattedDate = rawDate;
            // 如果日期是 8 碼數字 (例如 20240520)，自動格式化為 2024-05-20
            if (/^\d{8}$/.test(rawDate)) {
                formattedDate = `${rawDate.substring(0,4)}-${rawDate.substring(4,6)}-${rawDate.substring(6,8)}`;
            }

            // Hashtags
            let hashtagsHtml = '';
            if(article['hashtags']) {
                hashtagsHtml = article['hashtags'].split(',').map(tag => 
                    `<span class="inline-block bg-blue-100 text-blue-700 rounded-full px-3 py-1 text-xs font-semibold">${tag.trim()}</span>`
                ).join('');
            }

            // Detail Points (針對每一點套用高亮)
            const detailPointsFormatted = article['detail_points']
                ? article['detail_points'].split('\n').filter(p => p.trim()).map(point => `
                    <li class="flex items-start gap-2 text-sm text-gray-700 leading-relaxed mb-3">
                        <svg class="w-4 h-4 text-orange-500 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                        </svg>
                        <span>${highlightText(point, currentSearchTerm)}</span>
                    </li>
                `).join('') : '';

            // Impact Analysis
            const benefited = parseImpactField(article['impact_analysis_benefited']);
            const damaged = parseImpactField(article['impact_analysis_damaged']);
            
            const renderChips = (targets, typeClass) => targets.map(t => 
                `<span class="inline-block bg-white ${typeClass} rounded-full px-3 py-1 text-xs font-semibold mr-1.5 mb-1.5 shadow-sm">${t}</span>`
            ).join('');

            const detailPaneHtml = `
                <div class="animate-fade-in">
                    <h2 class="text-2xl font-bold text-gray-900 mb-2 leading-tight">${displayTitle}</h2>
                    
                    <!-- 新增：新聞發布日期 -->
                    ${formattedDate ? `
                    <div class="flex items-center text-sm text-gray-500 mb-5 font-medium">
                        <svg class="w-4 h-4 mr-1.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                        </svg>
                        發布日期：${formattedDate}
                    </div>` : ''}

                    ${hashtagsHtml ? `<div class="mb-8 flex flex-wrap gap-2">${hashtagsHtml}</div>` : ''}

                    <!-- 重點速報 -->
                    <div class="mb-8">
                        <h3 class="flex items-center text-gray-800 font-bold text-base mb-3">
                            <div class="w-7 h-7 bg-blue-100 rounded-lg flex items-center justify-center mr-2 flex-shrink-0">
                                <svg class="w-4 h-4 text-blue-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                                </svg>
                            </div>
                            重點速報 (Highlight)
                        </h3>
                        <div class="text-gray-700 text-sm leading-relaxed">
                            ${displayHighlightText}
                        </div>
                    </div>

                    <!-- 關鍵細節 -->
                    <div class="mb-8">
                        <h3 class="flex items-center text-gray-800 font-bold text-base mb-3">
                            <div class="w-7 h-7 bg-blue-100 rounded-lg flex items-center justify-center mr-2 flex-shrink-0">
                                <svg class="w-4 h-4 text-blue-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path>
                                </svg>
                            </div>
                            關鍵細節 (Detail Points)
                        </h3>
                        <ul class="space-y-1">
                            ${detailPointsFormatted}
                        </ul>
                    </div>

                    <!-- 策略解讀 -->
                    <div class="mb-8 bg-orange-50 rounded-xl p-5 border-l-4 border-orange-500">
                        <h3 class="flex items-center text-orange-800 font-bold text-base mb-3">
                            <div class="w-7 h-7 bg-orange-500 rounded-full flex items-center justify-center mr-2 flex-shrink-0">
                                <span class="text-white text-sm leading-none">💡</span>
                            </div>
                            PM Insight
                        </h3>
                        <div class="text-gray-700 text-sm leading-relaxed">
                            ${displayPmInsight}
                        </div>
                    </div>

                    <!-- 產業連動與標的 -->
                    <div class="mb-8">
                        <h3 class="flex items-center text-gray-800 font-bold text-base mb-4">
                            產業連動與標的 <span class="text-xs text-gray-500 font-normal ml-2 uppercase">(Impact Analysis)</span>
                        </h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <!-- 受惠 -->
                            <div class="bg-green-50 rounded-xl p-5">
                                <h4 class="flex items-center text-sm font-bold text-green-800 mb-3">
                                    <div class="w-6 h-6 bg-green-500 rounded-full flex items-center justify-center mr-2 flex-shrink-0">
                                        <svg class="w-3.5 h-3.5 text-white" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
                                    </div>
                                    受惠分析 (Benefited)
                                </h4>
                                <p class="text-sm text-green-900 mb-4">${benefited.description}</p>
                                ${benefited.targets.length ? `<div class="flex flex-wrap items-center"><span class="text-xs text-green-700 font-bold mr-2">標的</span>${renderChips(benefited.targets, 'text-green-700 border border-green-200')}</div>` : ''}
                            </div>
                            <!-- 受損 -->
                            <div class="bg-red-50 rounded-xl p-5">
                                <h4 class="flex items-center text-sm font-bold text-red-800 mb-3">
                                    <div class="w-6 h-6 bg-red-500 rounded-full flex items-center justify-center mr-2 flex-shrink-0">
                                        <svg class="w-3.5 h-3.5 text-white" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
                                    </div>
                                    受損分析 (Damaged)
                                </h4>
                                <p class="text-sm text-red-900 mb-4">${damaged.description}</p>
                                ${damaged.targets.length ? `<div class="flex flex-wrap items-center"><span class="text-xs text-red-700 font-bold mr-2">標的</span>${renderChips(damaged.targets, 'text-red-700 border border-red-200')}</div>` : ''}
                            </div>
                        </div>
                    </div>

                    <!-- 閱讀原始文章按鈕 -->
                    ${article['url'] ? `
                    <div class="text-right pt-4 border-t border-gray-100 mt-auto">
                        <a href="${article['url']}" target="_blank" class="inline-flex items-center justify-center border border-gray-300 text-gray-600 hover:text-blue-700 hover:border-blue-400 hover:bg-blue-50 px-5 py-2.5 rounded-lg text-sm font-medium transition-all shadow-sm">
                            閱讀原始文章 
                            <svg class="w-3.5 h-3.5 ml-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                        </a>
                    </div>
                    ` : ''}
                </div>
            `;
            
            document.getElementById('articleDetailPane').innerHTML = detailPaneHtml;

            if(window.innerWidth < 1024) {
                // 選文章後自動收起目錄
                const pane = document.getElementById('articleListPane');
                const icon = document.getElementById('articleListToggleIcon');
                const btn = document.getElementById('articleListToggle');
                pane.classList.add('hidden');
                pane.classList.remove('flex', 'flex-col');
                icon.style.transform = '';
                btn.setAttribute('aria-expanded', 'false');
                document.getElementById('articleDetailPane').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        window.addEventListener('DOMContentLoaded', initData);

    </script>
</body>
</html>
